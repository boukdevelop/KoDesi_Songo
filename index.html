<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/variables.css"/>
    <link rel="stylesheet" href="styles/style.css"/>
    <title>SONGO</title>

    <!-- Favicon standard -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon.png">

    <!-- Pour les appareils Apple (iPhone, iPad) -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon.png">

    <!-- Optionnel : icône Android / PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- AFFICHAGE DE L'IMAGE DE FOND : https://stackoverflow.com/questions/2475739/how-to-set-a-background-image-to-cover-the-entire-page-with-css -->
     <!-- Open Graph (Facebook, WhatsApp, LinkedIn, Discord…) -->
<meta property="og:title" content="SONGO – Jeu de semailles Ekang">
<meta property="og:description" content="Affrontez un ami, l’ordinateur ou un joueur en ligne dans ce jeu de stratégie traditionnel.">
<meta property="og:image" content="https://kodesi-songo.onrender.com/images/logo-songo.png">
<meta property="og:url" content="https://ton-site.com">
<meta property="og:type" content="website">
<meta property="og:locale" content="fr_FR">

<!-- Twitter Card (pour un aperçu sur Twitter / X) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="SONGO – Jeu de semailles Ekang">
<meta name="twitter:description" content="Affrontez un ami, l’ordinateur ou un joueur en ligne dans ce jeu de stratégie traditionnel.">
<meta name="twitter:image" content="https://kodesi-songo.onrender.com/images/logo-songo.png">

</head>
<body>
    <img src="images/bg.png" alt="Image illustrant le Songo" class="bg-img">

    <!-- ========== MENU PRINCIPAL (accueil) ========== -->
    <div id="main-menu" class="main-menu">
        <img src="images/bg_menu.png" alt="Image d'arriere plan du jeu, des mains de femmes en train de jouer" class="menu-bg">
        <h1 class="main-title">SONGO</h1>
        <p class="subtitle">Jeu de semailles traditionnel Ekang</p>
        <div class="menu-buttons">
            <button id="btn-pvp" class="menu-btn">👥 Jouer contre un ami</button>
            <button id="btn-pve" class="menu-btn">🤖 Jouer contre l'ordinateur</button>
            <button id="btn-online" class="menu-btn">🌐 Jouer en ligne</button>
        </div>

        <!-- Panneau du mode en ligne -->
        <div id="online-panel" style="display: none; margin-top: 30px; text-align: center;">
            <div id="create-room-section">
                <button id="btn-create-room" class="menu-btn">Créer un salon</button>
                
                <p id="waiting-message" style="color: var(--secondary-text);"></p>
            </div>
            <p id="room-code-display" style="font-size: 2rem; color: var(--primary-text); margin: 20px 0;"></p>
            <div id="join-room-section" style="margin-top: 20px;">
                <input type="text" id="room-code-input" placeholder="Entrez le code du salon" maxlength="4" style="padding: 10px; font-size: 1.2rem; text-transform: uppercase;">
                <button id="btn-join-room" class="menu-btn">Rejoindre</button>
            </div>
            <button id="btn-back-online" class="menu-btn" style="margin-top: 20px;">Retour</button>
        </div>
        <p class="credit-text" style="margin-top: 40px; color:var(--primary-text)">© 2026 K-Songo (KoDesi Songo) · Crédits</p>
    </div>

    <!-- ========== ÉCRAN DE JEU (caché au début) ========== -->
    <div id="game-screen" style="display: none;">

        <!-- Barre de menu du jeu -->
        <div class="Menu">
            <div class="items" id="menu">Menu</div>
            <div class="items" id="options">Options</div>	
            <div class="items" id="credits">Credits</div>	
        </div>

        <!-- Panneau Options (caché) -->
        <div id="options-panel" class="options-panel" style="display: none;">
            <h3>Mode de jeu</h3>
            <label>
                <input type="radio" name="gameMode" value="pvp" checked> Joueur vs Joueur
            </label>
            <label>
                <input type="radio" name="gameMode" value="pve"> Joueur vs IA
            </label>
            <button id="apply-options">Appliquer & Nouvelle partie</button>
        </div>

        <!-- Infos joueurs -->
        <div class="info-joueur">
            <div class="joueur1">
                <span>JOUEUR 1 :</span>
                <div class="message1"></div>
                <div>Graines</div>
                <span id="score1">0</span>
            </div>
            <div class="joueur2">
                <span>JOUEUR 2 :</span>
                <div class="message2"></div>
                <div>Graines</div>
                <span id="score2">0</span>
            </div>
        </div>

        <div class="contain">

            <!-- Plateau de jeu -->
            <table class="board">
                <tr class="line1">
                    <td></td><td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr class="line2">
                    <td></td><td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
            </table>

            <!-- Actions en ligne (revanche, quitter) -->
            <div id="online-actions" style="display: none; margin-top: 20px; text-align: center;">
                <button id="btn-rematch" class="menu-btn">Proposer une revanche</button>
                <button id="btn-leave-online" class="menu-btn">Quitter la partie en ligne</button>
            </div>

            <!-- Historique -->
            <div class="info"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="scripts/script.js"></script>
</body>
</html>

<!-- Livre sur le comportement humain : "Surrounded by Idiots" de Thomas Erikson, qui classe les personnalités en quatre couleurs (Rouge, Jaune, Vert, Bleu) et explique comment interagir efficacement avec chaque type. -->
